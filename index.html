<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股事件簿</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <h1>台股事件簿</h1>
        <p class="subtitle">目前顯示：全市場各事件日期</p>
      </div>

      <div class="toolbar">
        <select id="stockSelect" class="stock-select" aria-label="選擇股票">
          <option value="__ALL__">全部股票</option>
        </select>
        <button id="themeToggleBtn" class="btn btn-light" type="button" aria-pressed="false">深色模式</button>
        <button id="todayBtn" class="btn btn-light">Today</button>
        <button id="refreshBtn" class="btn btn-primary" type="button">Refresh</button>
        <button id="prevBtn" class="btn btn-light">‹</button>
        <button id="nextBtn" class="btn btn-light">›</button>
      </div>

      <div class="month-title-wrap">
        <h2 id="monthTitle" class="month-title"></h2>
      </div>
    </header>

    <section class="legend">
      <span class="legend-item">
        <span class="dot dot-dividend"></span> 除權息
      </span>
      <span class="legend-item">
        <span class="dot dot-earnings-call"></span> 法說會
      </span>
      <span class="legend-item">
        <span class="dot dot-shareholder-meeting"></span> 股東會
      </span>
    </section>

    <main class="calendar-card">
      <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </main>

    <section class="footer-info">
      <div id="updateInfo">載入中...</div>
      <div>資料來源：TWSE</div>
    </section>
  </div>

  <div id="eventModal" class="modal hidden">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-panel">
      <button id="closeModalBtn" class="modal-close" aria-label="關閉">×</button>
      <div class="modal-header">
        <h3 id="modalTitle">事件詳情</h3>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
